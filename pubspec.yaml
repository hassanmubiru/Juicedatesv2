name: juicedates
description: Values dating revolution - 85% reply rate
version: 1.0.5+5
environment:
  sdk: '>=3.5.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  http: ^1.2.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_bloc: ^8.1.6
  shared_preferences: ^2.3.5
  lottie: ^3.1.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_card_swiper: ^7.0.0
  permission_handler: ^11.3.1
  # google_sign_in removed
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 23
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
